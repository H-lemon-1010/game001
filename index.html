<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>벽돌깨기 게임</title>

<style>
  body {
    margin: 0;
    background: #e6f7ff;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #gameContainer {
    position: relative;
  }

  canvas {
    background: #fff;
    display: block;
  }

  button {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 15px 30px;
    font-size: 18px;
    border-radius: 10px;
    background: #ffd93d;
    border: none;
  }
</style>
</head>

<body>

<h3>벽돌깨기 (10초)</h3>

<div id="gameContainer">
  <canvas id="game"></canvas>
</div>

<p id="status"></p>
<button id="restart" onclick="restartGame()" style="display:none;">다시하기</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 🔴 기준 해상도
const baseWidth = 400;
const baseHeight = 500;

let scale = 1;

// 🔴 화면 맞춤 (비율 유지)
function resizeCanvas() {
  const ratio = baseWidth / baseHeight;
  let width = window.innerWidth;
  let height = window.innerHeight * 0.8;

  if (width / height > ratio) {
    width = height * ratio;
  } else {
    height = width / ratio;
  }

  canvas.style.width = width + "px";
  canvas.style.height = height + "px";

  canvas.width = baseWidth;
  canvas.height = baseHeight;

  scale = width / baseWidth;
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// ===== 게임 변수 =====
let paddleX, ballX, ballY, dx, dy;
const paddleWidth = 80;
let bricks, startTime, gameOver;

// 초기화
function initGame() {
  paddleX = 150;
  ballX = Math.random() * 300 + 50;
  ballY = Math.random() * 200 + 200;
  dx = 3;
  dy = -3;

  bricks = [];
  for(let i=0;i<4;i++){
    for(let j=0;j<5;j++){
      bricks.push({x: j*70+30, y: i*30+30, alive:true});
    }
  }

  startTime = Date.now();
  gameOver = false;
}

// 키보드
document.addEventListener("keydown", e => {
  if(e.key === "ArrowLeft") paddleX -= 20;
  if(e.key === "ArrowRight") paddleX += 20;
});

// 마우스
canvas.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  paddleX = (e.clientX - rect.left) / scale - paddleWidth/2;
});

// 모바일 터치
canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  paddleX = (e.touches[0].clientX - rect.left) / scale - paddleWidth/2;
}, { passive: false });

// 게임 그리기
function draw() {
  if(gameOver) return;

  ctx.clearRect(0,0,baseWidth,baseHeight);

  // 패들
  ctx.fillRect(paddleX, baseHeight - 40, paddleWidth, 10);

  // 공
  ctx.beginPath();
  ctx.arc(ballX, ballY, 8, 0, Math.PI*2);
  ctx.fill();

  // 벽돌
  bricks.forEach(b=>{
    if(b.alive){
      ctx.fillRect(b.x,b.y,60,20);

      if(ballX > b.x && ballX < b.x+60 &&
         ballY > b.y && ballY < b.y+20){
        dy *= -1;
        b.alive = false;
      }
    }
  });

  // 이동
  ballX += dx;
  ballY += dy;

  // 벽
  if(ballX < 0 || ballX > baseWidth) dx *= -1;
  if(ballY < 0) dy *= -1;

  // 패들
  if(ballY > baseHeight - 50 &&
     ballX > paddleX &&
     ballX < paddleX + paddleWidth){
    dy *= -1;
  }

  // 바닥
  if(ballY > baseHeight) endGame(false);

  // 시간
  let time = (Date.now() - startTime)/1000;
  document.getElementById("status").innerText =
    "남은 시간: " + Math.max(0, (10 - time)).toFixed(1);

  if(time > 10) endGame(false);

  // 승리
  if(bricks.every(b=>!b.alive)) endGame(true);

  requestAnimationFrame(draw);
}

function endGame(win){
  if(gameOver) return;
  gameOver = true;
  document.getElementById("status").innerText = win ? "성공!" : "실패!";
  document.getElementById("restart").style.display = "block";
}

function restartGame(){
  initGame();
  document.getElementById("restart").style.display = "none";
  draw();
}

// 시작
initGame();
draw();
</script>

</body>
</html>
